<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Usbedb Data Collection System - Secure and Accurate Staff Identity Management"
    />
    <meta
      name="keywords"
      content="Staff Data, Biometric, Identity Collection, Education, React App"
    />
    <meta name="author" content="Perttos Digital" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>Subeb | Data Capture &amp; Biometric Collection System</title>
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body style="background-color: #f4f4f4; padding: 1rem">
    <div id="root">
      <header id="main-header">
        <div id="header-body">
          <div class="hbinner">
            <div class="smart-con">
              <a>
                <h1 class="h1Text">Subeb Data Collection</h1>
              </a>
              <p>Data Collection Tool For Subeb Schools</p>
            </div>
          </div>
        </div>
      </header>
      <main id="main">
        <div>
          <div class="form-header">
            <h2>Staff Information Entry</h2>
            <p>Please fill in all required fields accurately</p>
          </div>
          <form action = '/captureDevice' method = 'POST' id="myForm" enctype="multipart/form-data" style="width: 100%;">
            <div id="form-area">
              <div id="form-sec1">
                <div id="fullNameDiv">
                  <label
                    >Full Name
                    <span>*</span>
                  </label>
                  <input
                    id="fullName"
                    placeholder="Enter complete name (first, middle, last)"
                    type="text"
                    value=""
                    name="fullName"
                  />
                </div>
                <div id="staffIdDiv">
                  <label>Staff ID <span>*</span></label
                  ><input
                    id="staffID"
                    placeholder="Unique alphanumeric identifier"
                    type="text"
                    value=""
                    name="staffId"
                  />
                </div>
                <div id ="dateOfBirthDiv">
                  <label>Date of Birth <span>*</span> </label
                  ><input type="date" id ="dateOfBirth" value="" name="dateOfBirth" />
                </div>
                <div id="genderDiv">
                  <label> Gender <span>*</span> </label>
                  <select name="gender" id="gender">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div id="nameOfSchoolDiv">
                  <label>Name Of School <span class="text-red-500">*</span> </label
                  ><input
                    id="nameOfSchool"
                    placeholder="Name Of School"
                    type="text"
                    value=""
                    name="nameOfSchool"
                  />
                </div>
                <div id="contactDiv">
                  <label>Contact Number <span>*</span></label
                  ><input
                    id="contact"
                    placeholder="Phone Number"
                    type="number"
                    value=""
                    name="contact"
                  />
                </div>
                <div id = "addressDiv">
                  <label>Home Address <span class="text-red-500">*</span> </label
                  ><input
                    id="address"
                    placeholder="Enter Home Address"
                    type="text"
                    value=""
                    name="address"
                  />
                </div>
                <div id="dateOfFADiv">
                  <label>Date Of First Appointment <span>*</span> </label
                  ><input id="dateOfFA" type="date" value="" name="dateOfFA" />
                </div>
                <div id="dateOfLPDiv">
                  <label>Date Of Last Promotion <span>*</span> </label
                  ><input id="dateOfLP" type="date" value="" name="dateOfLP" />
                </div>
                <div id="ninDiv">
                  <label>NIN <span>*</span></label
                  ><input
                    id="nin"
                    placeholder="National Identification Number"
                    type="number"
                    value=""
                    name="nin"
                  />
                </div>
                <div id="lgaDiv">
                  <label>LGA Origin <span class="text-red-500">*</span> </label
                  ><input
                    id="lga"
                    placeholder="Enter LGA Origin"
                    type="text"
                    value=""
                    name="lga"
                  />
                </div>
              </div>
            </div>
            <div id="form-area2">
              <h3>
                Document Upload
              </h3>
              <div id="form-sec2-all">
                <div id="form-sec2-text">
                  <label>
                  Passport Photograph
                  <span>*</span>
                </label>
                </div>
                  <div id="form-sec2">
                    <input accept=".jpg, .jpeg, .png" name="passport" type="file" id="uploadInput" class="hidden" />
                    <button type = "button" id = "uploadBtn">
                      <div style="display: flex; justify-content: center;">
                        <span style="color:green; font-size: 0.9rem; font-family: verdana;">
                          Upload Passport Photo
                        </span>
                      </div>
                    </button>
                  </div>
                  <p class="form-area2-p">JPEG format only, maximum size 2MB</p>
                </div>
            </div>
            <div id="form-area3">
              <h3>
                  Biometric Data <span>*</span>
              </h3>
              <div id="display-fingerprint-image" class="scannow-images-con">
                <img src ="./images/scannow.png" id = "fingerprint-imageID" class="fingerprint-image"/>
              </div>
              <div style="display: flex; justify-content: space-between;">
                <div class ="scanner-con">
                  <div class="fingerprint">
                    <h4>Fingerprint Scanner</h4>
                    <p>
                      Connect compatible fingerprint hardware to capture
                      biometric data
                    </p>
                  </div>
                </div>
                <div style="display: flex; align-items: center;">
                    <button type="button" id="scannowID" class="scannow">Scan Now</button>
                </div>
              </div>
              </div>
            </div>
            <div id="form-area4">
              <button type="submit" id="submit">
                <span>Submit Record</span>
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
    <script src="./javascript/index.js"></script>
  </body>
</html>
